name: Watch jean releases

# Poll coollabsio/jean daily. When a jean version appears that we haven't built
# yet, dispatch release.yml to build it. release.yml versions the build as
# <jean-version><letter> (e.g. v0.1.58a) and creates the GitHub Release.
on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {} # allow a manual check

permissions:
  actions: write # dispatch release.yml
  contents: read # read existing releases

jobs:
  check:
    name: Trigger build on new jean version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch build if jean has a newer version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Newest jean release that actually ships both .deb assets we build
          # from. jean tags the GitHub Release before its CI uploads the platform
          # binaries, so `releases/latest` can briefly be asset-less; targeting it
          # would dispatch a build that 404s. Wait for a complete release instead
          # (mirrors release.yml's resolver).
          TAG=$(gh api 'repos/coollabsio/jean/releases?per_page=20' --jq '
            map(select(.draft==false and .prerelease==false))
            | map(select(
                (.tag_name|ltrimstr("v")) as $v
                | (.assets|map(.name)) as $n
                | ($n|any(. == "Jean_"+$v+"_amd64.deb")) and ($n|any(. == "Jean_"+$v+"_arm64.deb"))
              ))
            | .[0].tag_name // empty')
          if [ -z "$TAG" ]; then
            echo "No jean release with both .deb assets yet - skipping."
            exit 0
          fi
          echo "Latest complete jean release: $TAG"

          # Already built this jean version? We'd have a release tagged $TAG<letter>.
          if gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName --jq '.[].tagName' | grep -qE "^${TAG}[a-z]$"; then
            echo "Already built $TAG - skipping."
            exit 0
          fi

          # Build the new jean on the repo state of our LAST published wrapper
          # release - not master HEAD - so in-progress repo changes you haven't
          # shipped yet don't ride along on an automatic jean bump. (release.yml
          # checks out this repo_ref as the Docker build context; its own workflow
          # file still comes from the default branch.) First-ever build: no prior
          # release, so repo_ref is blank and release.yml builds the branch HEAD.
          LAST_RELEASE=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 \
            --json tagName --jq '.[0].tagName // empty')
          echo "Dispatching build for jean $TAG on repo ${LAST_RELEASE:-HEAD}"
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --field jean_ref="$TAG" \
            --field repo_ref="$LAST_RELEASE"

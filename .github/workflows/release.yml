name: Release

# Every build gets its own immutable version, combining jean's version with a
# wrapper revision letter: jean v0.1.57 + wrapper build -> v0.1.57a, v0.1.57b, ...
# A new jean version resets the letter (v0.1.58a).
#
# Manual only - there is no push trigger. Builds happen when you explicitly want
# them to, so unreleased repo changes on master never ship by accident:
#   - workflow_dispatch (you)      -> apply your repo changes: blank repo_ref builds
#                                     this branch's HEAD (master).
#   - workflow_dispatch (watcher)  -> bump jean only: watch-upstream passes the
#                                     commit of the last published wrapper release
#                                     as repo_ref, so master WIP is ignored.
#
# Build topology (3 jobs):
#   prepare -> build (matrix: amd64 + arm64, NATIVE runners) -> release (merge)
# The per-arch images build on native runners (no QEMU) and push by DIGEST; the
# release job stitches them into the multi-arch manifest and tags it. Theia is
# NOT compiled here - it comes prebuilt from the same repo's `theia-base` tag
# (Dockerfile.theia / theia-base.yml), pinned to a digest by `prepare`.
on:
  workflow_dispatch:
    inputs:
      jean_ref:
        description: "jean release tag to build (e.g. v0.1.57); blank = latest complete release"
        required: false
        default: ""
      repo_ref:
        description: "repo commit/branch/tag to build (blank = this branch HEAD)"
        required: false
        default: ""

permissions:
  contents: read

# Serialize releases so two overlapping dispatches can't race on the wrapper
# letter (both reading the same "last letter" before either publishes).
concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE: spotwhale/jean-dockerized
  THEIA_TAG: theia-base # prebuilt Theia base, same repo (published by theia-base.yml)

jobs:
  # Resolve everything that must be decided ONCE (not per-arch): the jean
  # release to bundle, this build's wrapper version tag, the exact source commit,
  # and the pinned Theia base digest. All flow to the matrix build as outputs.
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      jean_ref: ${{ steps.jean.outputs.ref }}
      tag: ${{ steps.ver.outputs.tag }}
      sha: ${{ steps.src.outputs.sha }}
      # Only the digest (no repo name) crosses the job boundary: the repo name
      # contains DOCKER_USERNAME, and GitHub redacts secret-bearing outputs to
      # empty downstream. The build job rebuilds the full ref from $IMAGE.
      theia_digest: ${{ steps.theia.outputs.digest }}
    steps:
      # Build the requested repo state. Blank repo_ref -> the branch this dispatch
      # ran on (master HEAD), i.e. your latest pushed changes. The watcher passes a
      # specific commit so jean-only bumps build the last released repo state.
      # NOTE: the workflow *file* itself always comes from the default branch for
      # workflow_dispatch; repo_ref only controls the checked-out Docker context.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_ref }}

      # Resolve the actual commit we checked out, so the GitHub Release tags it
      # (GITHUB_SHA points at the dispatch branch, not necessarily repo_ref).
      - name: Resolve built commit
        id: src
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Base version = the jean release we bundle. From the dispatch input, else
      # the newest jean release that actually ships the amd64 AND arm64 .deb we
      # build from. jean publishes the GitHub Release the instant it's tagged but
      # its CI uploads the platform binaries minutes later, so `releases/latest`
      # briefly points at an asset-less release - building against it 404s on the
      # ADD. Skipping releases without both .deb assets makes the daily watcher
      # (and pushes) wait for a complete release instead of failing. The .deb only
      # exists for release tags, never branches.
      - name: Resolve jean version
        id: jean
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref="${{ github.event.inputs.jean_ref }}"
          if [ -z "$ref" ]; then
            ref="$(gh api 'repos/coollabsio/jean/releases?per_page=20' --jq '
              map(select(.draft==false and .prerelease==false))
              | map(select(
                  (.tag_name|ltrimstr("v")) as $v
                  | (.assets|map(.name)) as $n
                  | ($n|any(. == "Jean_"+$v+"_amd64.deb")) and ($n|any(. == "Jean_"+$v+"_arm64.deb"))
                ))
              | .[0].tag_name // empty')"
          fi
          if [ -z "$ref" ]; then
            echo "::error::No jean release with both amd64+arm64 .deb assets found"; exit 1
          fi
          echo "Bundling jean $ref"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      # Full version = jean version + next free wrapper letter. Look at existing
      # releases for this jean version and pick the next letter (a, b, c, ...).
      - name: Compute version tag
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base="${{ steps.jean.outputs.ref }}"
          existing=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName --jq '.[].tagName' | grep -E "^${base}[a-z]$" | sort || true)
          if [ -z "$existing" ]; then
            suffix=a
          else
            last=$(echo "$existing" | tail -n1 | sed -E "s/^${base}//")
            if [ "$last" = "z" ]; then
              echo "::error::Ran out of wrapper letters (z) for $base"; exit 1
            fi
            suffix=$(printf "\\$(printf '%03o' $(( $(printf '%d' "'$last") + 1 )))")
          fi
          tag="${base}${suffix}"
          echo "Version tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Logged in so the digest inspect below works even if the Theia base repo
      # is private, and to avoid anonymous Docker Hub rate limits.
      - name: Docker - Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Pin the Theia base to its current digest so every arch in the matrix
      # copies the exact same prebuilt /opt/theia, and the release is reproducible
      # (no mutable tag baked into an image that carries live creds). If the base
      # was never built, fail loud with the fix. Output ONLY the digest - the full
      # ref includes the repo name (= DOCKER_USERNAME secret), which GitHub would
      # redact to empty when passed to the build job.
      - name: Pin Theia base digest
        id: theia
        run: |
          if ! digest=$(docker buildx imagetools inspect "${IMAGE}:${THEIA_TAG}" \
                          --format '{{.Manifest.Digest}}' 2>/dev/null) || [ -z "$digest" ]; then
            echo "::error::${IMAGE}:${THEIA_TAG} not found. Run the 'Theia base image' workflow first."
            exit 1
          fi
          echo "Theia base digest: $digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  # Build each arch on its own NATIVE runner (no QEMU) and push by digest. The
  # release job below assembles the multi-arch manifest from these digests.
  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_ref }}

      - name: Docker - Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          build-args: |
            JEAN_REF=${{ needs.prepare.outputs.jean_ref }}
            IMAGE_VERSION=${{ needs.prepare.outputs.tag }}
            THEIA_BASE=${{ env.IMAGE }}@${{ needs.prepare.outputs.theia_digest }}
          cache-from: type=gha,scope=release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: release-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into the published multi-arch manifest, tag it
  # (version + latest), record the GitHub Release, and refresh the status badge.
  release:
    name: Release - publish manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the GitHub Release + tag for each build
      actions: write # `gh workflow run image-status.yml` to refresh the badge
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: release-digest-*
          merge-multiple: true

      - name: Docker - Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest
        working-directory: /tmp/digests
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools inspect "${IMAGE}:${TAG}"

      # Record the build. Created only after a successful manifest push so the
      # Releases page never lists a version that didn't actually publish.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          JEAN: ${{ needs.prepare.outputs.jean_ref }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$SHA" \
            --title "$TAG" \
            --notes "Bundles jean [$JEAN](https://github.com/coollabsio/jean/releases/tag/$JEAN)." \
            --latest

      # The release's `published` event won't start image-status.yml on its own:
      # GitHub blocks events made by GITHUB_TOKEN from triggering new workflow
      # runs. workflow_dispatch is exempt, so kick the badge refresh explicitly.
      - name: Refresh image-status badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run image-status.yml --repo "$GITHUB_REPOSITORY" --ref master

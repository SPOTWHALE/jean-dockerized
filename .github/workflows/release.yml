name: Release

# Every build gets its own immutable version, combining jean's version with a
# wrapper revision letter: jean v0.1.57 + wrapper build -> v0.1.57a, v0.1.57b, ...
# A new jean version resets the letter (v0.1.58a).
#
# Manual only - there is no push trigger. Builds happen when you explicitly want
# them to, so unreleased repo changes on master never ship by accident:
#   - workflow_dispatch (you)      -> apply your repo changes: blank repo_ref builds
#                                     this branch's HEAD (master).
#   - workflow_dispatch (watcher)  -> bump jean only: watch-upstream passes the
#                                     commit of the last published wrapper release
#                                     as repo_ref, so master WIP is ignored.
on:
  workflow_dispatch:
    inputs:
      jean_ref:
        description: "jean release tag to build (e.g. v0.1.57); blank = latest complete release"
        required: false
        default: ""
      repo_ref:
        description: "repo commit/branch/tag to build (blank = this branch HEAD)"
        required: false
        default: ""

permissions:
  contents: write # create the GitHub Release + tag for each build

jobs:
  release:
    name: Release - Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Build the requested repo state. Blank repo_ref -> the branch this dispatch
      # ran on (master HEAD), i.e. your latest pushed changes. The watcher passes a
      # specific commit so jean-only bumps build the last released repo state.
      # NOTE: the workflow *file* itself always comes from the default branch for
      # workflow_dispatch; repo_ref only controls the checked-out Docker context.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_ref }}

      # Resolve the actual commit we checked out, so the GitHub Release tags it
      # (GITHUB_SHA points at the dispatch branch, not necessarily repo_ref).
      - name: Resolve built commit
        id: src
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Base version = the jean release we bundle. From the dispatch input, else
      # the newest jean release that actually ships the amd64 AND arm64 .deb we
      # build from. jean publishes the GitHub Release the instant it's tagged but
      # its CI uploads the platform binaries minutes later, so `releases/latest`
      # briefly points at an asset-less release - building against it 404s on the
      # ADD. Skipping releases without both .deb assets makes the daily watcher
      # (and pushes) wait for a complete release instead of failing. The .deb only
      # exists for release tags, never branches.
      - name: Resolve jean version
        id: jean
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref="${{ github.event.inputs.jean_ref }}"
          if [ -z "$ref" ]; then
            ref="$(gh api 'repos/coollabsio/jean/releases?per_page=20' --jq '
              map(select(.draft==false and .prerelease==false))
              | map(select(
                  (.tag_name|ltrimstr("v")) as $v
                  | (.assets|map(.name)) as $n
                  | ($n|any(. == "Jean_"+$v+"_amd64.deb")) and ($n|any(. == "Jean_"+$v+"_arm64.deb"))
                ))
              | .[0].tag_name // empty')"
          fi
          if [ -z "$ref" ]; then
            echo "::error::No jean release with both amd64+arm64 .deb assets found"; exit 1
          fi
          echo "Bundling jean $ref"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      # Full version = jean version + next free wrapper letter. Look at existing
      # releases for this jean version and pick the next letter (a, b, c, ...).
      - name: Compute version tag
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base="${{ steps.jean.outputs.ref }}"
          existing=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName --jq '.[].tagName' | grep -E "^${base}[a-z]$" | sort || true)
          if [ -z "$existing" ]; then
            suffix=a
          else
            last=$(echo "$existing" | tail -n1 | sed -E "s/^${base}//")
            if [ "$last" = "z" ]; then
              echo "::error::Ran out of wrapper letters (z) for $base"; exit 1
            fi
            suffix=$(printf "\\$(printf '%03o' $(( $(printf '%d' "'$last") + 1 )))")
          fi
          tag="${base}${suffix}"
          echo "Version tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Docker - Login
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKER_USERNAME }}'
          password: '${{ secrets.DOCKER_PASSWORD }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker - Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            spotwhale/jean-dockerized
          tags: |
            type=raw,value=${{ steps.ver.outputs.tag }}
            type=raw,value=latest

      - name: Docker - Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # arm64 too: jean ships an arm64 .deb, so the same image runs on Apple
          # Silicon servers, Ampere/Graviton VPSes, and Raspberry Pi. buildx fans
          # out per platform and TARGETARCH picks the right .deb + Docker repo.
          platforms: linux/amd64,linux/arm64
          push: true
          # Skip provenance/SBOM attestations so the multi-arch index stays clean
          # (one image per platform, no extra attestation manifests).
          provenance: false
          sbom: false
          build-args: |
            JEAN_REF=${{ steps.jean.outputs.ref }}
            IMAGE_VERSION=${{ steps.ver.outputs.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Record the build. Created only after a successful push so the Releases
      # page never lists a version that didn't actually publish.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          JEAN="${{ steps.jean.outputs.ref }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "${{ steps.src.outputs.sha }}" \
            --title "$TAG" \
            --notes "Bundles jean [$JEAN](https://github.com/coollabsio/jean/releases/tag/$JEAN)." \
            --latest

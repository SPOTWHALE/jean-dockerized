services:
  jean:
    # Pin to a specific version tag in production (e.g. spotwhale/jean-dockerized:v0.1.57a)
    # so `docker compose pull` doesn't silently update to a broken release.
    image: spotwhale/jean-dockerized:latest
    restart: unless-stopped
    # Run a real init (tini) as PID 1. jean would otherwise be PID 1 with no child
    # reaper or signal forwarder: Docker-in-Docker constantly orphans processes
    # that reparent to PID 1 (zombie buildup), and on stop/restart jean would not
    # forward SIGTERM to dockerd, risking an unclean /var/lib/docker shutdown. tini
    # reaps zombies and forwards signals, and lets the health watchdog's `kill 1`
    # actually take effect (the kernel ignores signals to a bare PID 1).
    init: true
    # Cap container log growth. jean is chatty on stdout and the default json-file
    # driver is unbounded, so on a long-lived host the logs alone can fill the disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Required for Docker-in-Docker (so agents can run `docker` / `docker compose`).
    privileged: true
    ports:
      # Bind to loopback only. Traefik/Coolify reaches the container via its
      # internal network, not through these host ports. Binding 0.0.0.0 risks
      # exposing jean directly if the reverse proxy is misconfigured.
      - "127.0.0.1:3456:3456"
      # Preview proxy: <port>.<your-wildcard-domain> -> container's dev servers.
      # Point a wildcard Coolify domain (*.apps.you.dev) at this port.
      - "127.0.0.1:8088:8088"
    # Reverse-proxy routing. ONLY needed for Traefik (incl. Coolify, which runs
    # Traefik underneath); other proxies (nginx, Caddy, Cloudflare Tunnel, NPM)
    # ignore these - configure those their own way. Commented out by default.
    #
    # Coolify's auto-domains drop the loadbalancer port on the HTTPS wildcard
    # service when one container serves two ports + a wildcard, so previews/IDE
    # 503. Workaround: CLEAR the Coolify "Domains" field and define routing by
    # hand below (stable, redeploy-proof names - no container-hash). Replace
    # jean.example.com with your host.
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.middlewares.jean-https.redirectscheme.scheme=https
    #   # main app (Jean UI) on 3456
    #   - 'traefik.http.routers.jean-app.rule=Host(`jean.example.com`)'
    #   - traefik.http.routers.jean-app.entrypoints=https
    #   - traefik.http.routers.jean-app.tls=true
    #   - traefik.http.routers.jean-app.tls.certresolver=letsencrypt
    #   - traefik.http.routers.jean-app.service=jean-app
    #   - traefik.http.services.jean-app.loadbalancer.server.port=3456
    #   - 'traefik.http.routers.jean-app-http.rule=Host(`jean.example.com`)'
    #   - traefik.http.routers.jean-app-http.entrypoints=http
    #   - traefik.http.routers.jean-app-http.middlewares=jean-https
    #   # preview + IDE wildcard on 8088 (matches <label>.jean.example.com, not the bare host)
    #   - 'traefik.http.routers.jean-prev.rule=HostRegexp(`^.+\.jean\.example\.com$`)'
    #   - traefik.http.routers.jean-prev.entrypoints=https
    #   - traefik.http.routers.jean-prev.tls=true
    #   - traefik.http.routers.jean-prev.tls.certresolver=letsencrypt
    #   - 'traefik.http.routers.jean-prev.tls.domains[0].main=jean.example.com'
    #   - 'traefik.http.routers.jean-prev.tls.domains[0].sans=*.jean.example.com'
    #   - traefik.http.routers.jean-prev.service=jean-prev
    #   - traefik.http.services.jean-prev.loadbalancer.server.port=8088
    #   - 'traefik.http.routers.jean-prev-http.rule=HostRegexp(`^.+\.jean\.example\.com$`)'
    #   - traefik.http.routers.jean-prev-http.entrypoints=http
    #   - traefik.http.routers.jean-prev-http.middlewares=jean-https
    environment:
      JEAN_HOST: 0.0.0.0
      JEAN_PORT: 3456
      PREVIEW_PORT: 8088
      # Preview subdomains are DISABLED (403) until you set PREVIEW_PASSWORD. Set it
      # to gate every preview port behind one basic-auth login (PREVIEW_USER: dev).
      # The bundled Theia IDE is reached through this same gate, so PREVIEW_PASSWORD
      # is required to open it too.
      # PREVIEW_USER: dev
      # PREVIEW_PASSWORD: change-me
      # Bundled Theia IDE (per-worktree, COSMETIC scoping - not a security boundary).
      # A dispatcher runs one Theia per git worktree, reached through the preview proxy:
      # ide.<wildcard> = picker, <repo>-<branch>.<wildcard> = that worktree's editor.
      # THEIA_HOST_SUFFIX is the preview-wildcard host the "</> IDE" button targets
      # (everything after the leading label). Required for correct button links.
      # THEIA_HOST_SUFFIX: .apps.you.dev
      # Public URL of this instance. When set, the startup banner prints a ready
      # login link (and a scannable QR) so onboarding is one tap on a phone.
      # JEAN_PUBLIC_URL: https://jean.example.com
      # Leave unset and jean auto-generates + persists a token.
      # JEAN_TOKEN: change-me-to-a-long-random-string
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'   # prevent runaway agent builds from starving the host; increase if needed
    volumes:
      - workspace:/workspace
      # Persist Docker-in-Docker images/layers across restarts.
      # docker-data accumulates unboundedly, so prune periodically:
      #   docker compose exec jean docker system prune -f
      - docker-data:/var/lib/docker

volumes:
  workspace:
  docker-data:
